# SPINK7-KLK5 MD Pipeline Configuration
# This file mirrors the defaults in src/config.py.
# Uncomment and modify values to override defaults for a specific run.

system:
  force_field: "amber14-all.xml"
  water_model: "amber14/tip3p.xml"
  force_field_family: "amber"
  ph: 7.4
  box_padding_nm: 1.2
  ionic_strength_molar: 0.15
  positive_ion: "Na+"
  negative_ion: "Cl-"
  box_shape: "cubic"

minimization:
  max_iterations: 10000
  tolerance_kj_mol_nm: 10.0

equilibration:
  nvt_duration_ps: 500.0
  npt_duration_ps: 1000.0
  temperature_k: 310.0
  friction_per_ps: 1.0
  timestep_ps: 0.002
  pressure_atm: 1.0
  barostat_interval: 25
  restraint_k_kj_mol_nm2: 1000.0
  save_interval_ps: 10.0
  random_seed: null

production:
  duration_ns: 100.0
  temperature_k: 310.0
  friction_per_ps: 1.0
  timestep_ps: 0.002
  pressure_atm: 1.0
  save_interval_ps: 10.0
  checkpoint_interval_ps: 100.0
  random_seed: null

smd:
  spring_constant_kj_mol_nm2: 1000.0
  pulling_velocity_nm_per_ps: 0.001
  pull_distance_nm: 3.0
  n_replicates: 50
  save_interval_ps: 1.0
  random_seed: null

umbrella:
  xi_min_nm: 1.5
  xi_max_nm: 4.0
  window_spacing_nm: 0.05
  spring_constant_kj_mol_nm2: 1000.0
  per_window_duration_ns: 10.0
  save_interval_ps: 1.0
  pre_position_velocity_nm_per_ps: 0.01
  pre_position_spring_constant_kj_mol_nm2: 1000.0
  equilibration_duration_ps: 200.0
  detect_equilibration: true

wham:
  tolerance: 1.0e-6
  max_iterations: 100000
  n_bootstrap: 200
  histogram_bins: 200

mbar:
  solver_protocol: "robust"
  relative_tolerance: 1.0e-7
  maximum_iterations: 10000
  n_bootstrap: 200
  n_pmf_bins: 200

# Advanced force field configurations (uncomment to use)

amoeba:
  force_field_xml: "amoeba2018.xml"
  water_model_xml: "amoeba2018_gk.xml"
  mutual_induced_target_epsilon: 1.0e-5
  polarization_type: "mutual"
  pme_grid_spacing_nm: 0.06
  ewald_error_tolerance: 1.0e-5

ml_potential:
  potential_name: "ani2x"
  implementation: "torchani"
  mixed_precision: true

qmmm:
  qm_method: "B3LYP"
  qm_basis_set: "6-31G*"
  qm_region_residues:
    - "HIS57"
    - "ASP102"
    - "SER195"

finite_size_correction:
  ewald_self_energy_constant: -2.837297
  solvent_dielectric: 80.0
  coulomb_constant_kj_nm_per_mol_e2: 138.935456
  apply_correction: true
